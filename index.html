<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ALP Moda</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5;}
header{text-align:center;background:#000;color:#fff;padding:20px;}
.container{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px;padding:15px;}
.card{background:#fff;border-radius:10px;overflow:hidden;}
.card img{width:100%;height:220px;object-fit:cover;}
</style>
</head>

<body>

<header>
<h1>ALP Moda</h1>
<p>Moda para mujer y caballero</p>
</header>

<div id="productos" class="container"></div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>

firebase.initializeApp({
 apiKey:"AIzaSyBZvW4o8SbyStxX6Sfm4uRmMfN4UAi2pYI",
 authDomain:"alp-moda.firebaseapp.com",
 projectId:"alp-moda"
});

const db=firebase.firestore();
const contenedor=document.getElementById("productos");

db.collection("productos").get().then(res=>{
 res.forEach(doc=>{
  let p=doc.data();

  contenedor.innerHTML+=`
  <div class="card">
    <img src="${p.imagen}">
    <div style="padding:10px">
      <b>${p.nombre}</b><br>
      $${p.precio}<br>
      ${p.descripcion}
    </div>
  </div>`;
 });
});

</script>

</body>
</html>
