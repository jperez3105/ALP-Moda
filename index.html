<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ALP Moda</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; margin:0; background:#f5f5f5; }
header { background:#000; color:#fff; text-align:center; padding:20px; }
.subtitulo { color:#f8c8dc; font-size:14px; }

.buscador { text-align:center; padding:15px; }
input { padding:10px; border-radius:20px; width:80%; max-width:400px; }

.carrusel img {
  width:100%;
  height:250px;
  object-fit:cover;
}

.container {
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
  padding:15px;
}

.card {
  background:#fff;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card img { width:100%; height:220px; object-fit:cover; }

.info { padding:10px; }

.boton {
  display:block;
  background:#f8c8dc;
  text-align:center;
  padding:8px;
  margin-top:10px;
  text-decoration:none;
  color:#000;
  border-radius:5px;
}

.whatsapp {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:#fff;
  padding:15px;
  border-radius:50%;
  font-size:20px;
  text-decoration:none;
}
</style>
</head>

<body>

<header style="position:relative; height:300px; overflow:hidden;">

<img src="https://images.unsplash.com/photo-1483985988355-763728e1935b"
style="width:100%; height:100%; object-fit:cover; filter:brightness(60%);">

<div style="
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
color:white;
">
<h1 style="font-size:32px; letter-spacing:3px;">ALP Moda</h1>
<p style="color:#f8c8dc;">Moda para mujer y caballero</p>
</div>

</header>

<div class="carrusel">
<img src="https://images.unsplash.com/photo-1520975916090-3105956dac38">
</div>

<div class="buscador">
<input id="searchInput" placeholder="Buscar producto...">
</div>

<div class="container" id="productos"></div>

<a class="whatsapp" href="https://wa.me/525564982986">💬</a>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
 apiKey: "AIzaSyBZvW4o8SbyStxX6Sfm4uRmMfN4UAi2pYI",
 authDomain: "alp-moda.firebaseapp.com",
 projectId: "alp-moda"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const contenedor = document.getElementById("productos");
const buscador = document.getElementById("searchInput");

let lista = [];

db.collection("productos").get().then(res => {
 lista = [];
 res.forEach(doc => lista.push(doc.data()));
 render(lista);
});

function render(productos){
 contenedor.innerHTML = "";

 productos.forEach(p => {

   if(!p.nombre || !p.precio || !p.imagen) return;

   contenedor.innerHTML += `
   <div class="card">
     <img src="${p.imagen}">
     <div class="info">
       <div>${p.nombre}</div>
       <div><b>$${p.precio}</b></div>
       <div style="font-size:12px;color:gray;">Entrega 2-3 días</div>
       <a class="boton" href="https://wa.me/525564982986?text=Me interesa ${p.nombre}">
       Comprar
       </a>
     </div>
   </div>`;
 });
}

buscador.addEventListener("keyup", ()=>{
 const f = buscador.value.toLowerCase();
 const filtrados = lista.filter(p => p.nombre?.toLowerCase().includes(f));
 render(filtrados);
});
</script>

</body>
</html>
