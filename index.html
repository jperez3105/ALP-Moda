<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ALP Moda</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #fff;
    }

    header {
      text-align: center;
      padding: 20px;
      background-color: #000;
      color: #fff;
    }

    header h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: 2px;
    }

    .subtitulo {
      color: #f8c8dc;
      font-size: 14px;
    }

    .buscador {
      padding: 15px;
      text-align: center;
    }

    .buscador input {
      width: 90%;
      max-width: 400px;
      padding: 10px;
      border-radius: 20px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
      padding: 15px;
    }

    .card {
      border: 1px solid #eee;
      border-radius: 10px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    .card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }

    .info {
      padding: 10px;
    }

    .nombre {
      font-size: 14px;
      margin: 5px 0;
    }

    .precio {
      color: #000;
      font-weight: bold;
    }

    .boton {
      display: block;
      text-align: center;
      margin-top: 10px;
      padding: 8px;
      background-color: #f8c8dc;
      color: #000;
      text-decoration: none;
      border-radius: 5px;
      font-size: 14px;
    }

    .nota {
      font-size: 12px;
      color: gray;
      margin-top: 5px;
    }

  </style>
</head>

<body>

<header>
  <h1>ALP Moda</h1>
  <div class="subtitulo">Moda por pedido • Elegancia para ti</div>
</header>

<div class="buscador">
  <input type="text" id="searchInput" placeholder="Buscar producto...">
</div>

<div class="container" id="productos">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1581044777550-4cfa60707c03">
    <div class="info">
      <div class="nombre">Vestido elegante rosa</div>
      <div class="precio">$450</div>
      <div class="nota">Entrega bajo pedido (2-3 días)</div>
      <a class="boton" href="https://wa.me/525564982986?text=Hola,%20me%20interesa%20el%20vestido%20rosa%20de%20$450">
        Pedir por WhatsApp
      </a>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f">
    <div class="info">
      <div class="nombre">Blusa casual blanca</div>
      <div class="precio">$320</div>
      <div class="nota">Entrega bajo pedido (2-3 días)</div>
      <a class="boton" href="https://wa.me/525564982986?text=Hola,%20me%20interesa%20la%20blusa%20blanca%20de%20$320">
        Pedir por WhatsApp
      </a>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1529139574466-a303027c1d8b">
    <div class="info">
      <div class="nombre">Bolsa moderna negra</div>
      <div class="precio">$380</div>
      <div class="nota">Entrega bajo pedido (2-3 días)</div>
      <a class="boton" href="https://wa.me/525564982986?text=Hola,%20me%20interesa%20la%20bolsa%20negra%20de%20$380">
        Pedir por WhatsApp
      </a>
    </div>
  </div>

</div>

<script>
  const buscador = document.getElementById("searchInput");
  const productos = document.querySelectorAll(".card");

  buscador.addEventListener("keyup", function() {
    const filtro = buscador.value.toLowerCase();

    productos.forEach(producto => {
      const texto = producto.innerText.toLowerCase();
      producto.style.display = texto.includes(filtro) ? "block" : "none";
    });
  });
</script>

</body>
</html>
