<!DOCTYPE html> 
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ALP Moda</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial; margin: 0; background: #fff; }
    header { text-align: center; padding: 20px; background: #000; color: #fff; }
    .subtitulo { color: #f8c8dc; font-size: 14px; }
    .buscador { padding: 15px; text-align: center; }
    .buscador input { width: 90%; max-width: 400px; padding: 10px; border-radius: 20px; }
    .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 15px; padding: 15px; }
    .card { border: 1px solid #eee; border-radius: 10px; overflow: hidden; }
    .card img { width: 100%; height: 220px; object-fit: cover; }
    .info { padding: 10px; }
    .precio { font-weight: bold; }
    .boton { display: block; text-align: center; margin-top: 10px; padding: 8px; background: #f8c8dc; color: #000; text-decoration: none; }
  </style>
</head>

<body>

<header>
  <h1>ALP Moda</h1>
  <div class="subtitulo">Moda por pedido • Elegancia para ti</div>
</header>

<div class="buscador">
  <input type="text" id="searchInput" placeholder="Buscar producto...">
</div>

<div class="container" id="productos"></div>

<!-- 🔥 FIREBASE FUNCIONAL -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBZvW4o8SbyStxX6Sfm4uRmMfN4UAi2pYI",
    authDomain: "alp-moda.firebaseapp.com",
    projectId: "alp-moda",
    storageBucket: "alp-moda.firebasestorage.app",
    messagingSenderId: "760963874633",
    appId: "1:760963874633:web:475f91b50a87123627a498"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const contenedor = document.getElementById("productos");
  const buscador = document.getElementById("searchInput");

  let listaProductos = [];

  async function cargarProductos() {
    const querySnapshot = await getDocs(collection(db, "productos"));

    listaProductos = [];

    querySnapshot.forEach((doc) => {
      listaProductos.push(doc.data());
    });

    mostrarProductos(listaProductos);
  }

  function mostrarProductos(productos) {
    contenedor.innerHTML = "";

    productos.forEach((p) => {
      const card = `
        <div class="card">
          <img src="${p.imagen}">
          <div class="info">
            <div class="nombre">${p.nombre}</div>
            <div class="precio">$${p.precio}</div>
            <div class="nota">Entrega bajo pedido (2-3 días)</div>
            <a class="boton" href="https://wa.me/525564982986?text=Hola,%20me%20interesa%20${p.nombre}%20de%20$${p.precio}">
              Pedir por WhatsApp
            </a>
          </div>
        </div>
      `;
      contenedor.innerHTML += card;
    });
  }

  buscador.addEventListener("keyup", function() {
    const filtro = buscador.value.toLowerCase();

    const filtrados = listaProductos.filter(p =>
      p.nombre.toLowerCase().includes(filtro)
    );

    mostrarProductos(filtrados);
  });

  cargarProductos();
</script>

</body>
</html>
