<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin ALP Moda</title>

<style>
body{
font-family:Arial;
background:linear-gradient(135deg,#000,#f8c8dc);
color:#fff;
padding:20px;
}

h2{text-align:center;}

input, textarea{
padding:10px;
margin:5px;
border-radius:8px;
border:none;
width:90%;
max-width:400px;
}

button{
padding:10px;
border:none;
border-radius:10px;
background:#ff4fa3;
color:white;
cursor:pointer;
margin:5px;
}

.card{
background:#fff;
color:#000;
padding:10px;
margin:10px 0;
border-radius:10px;
}

img{
width:80px;
border-radius:8px;
}
</style>
</head>

<body>

<h2>📦 Panel de productos</h2>

<input id="nombre" placeholder="Nombre"><br>
<input id="precio" placeholder="Precio"><br>

<textarea id="descripcion" placeholder="Descripción"></textarea><br>

<input type="file" id="imagen1"><br>
<input type="file" id="imagen2"><br>

<button onclick="agregar()">Agregar producto</button>

<hr>

<input id="buscar" placeholder="Buscar producto...">

<div id="lista"></div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>

<script>
firebase.initializeApp({
 apiKey:"AIzaSyBZvW4o8SbyStxX6Sfm4uRmMfN4UAi2pYI",
 authDomain:"alp-moda.firebaseapp.com",
 projectId:"alp-moda",
 storageBucket:"alp-moda.appspot.com"
});

const db = firebase.firestore();
const storage = firebase.storage();

let productos = [];

async function subirImagen(file){
 const ref = storage.ref("productos/" + Date.now() + "_" + file.name);
 await ref.put(file);
 return await ref.getDownloadURL();
}

async function agregar(){
 let nombre = document.getElementById("nombre").value;
 let precio = document.getElementById("precio").value;
 let descripcion = document.getElementById("descripcion").value;
 let file1 = document.getElementById("imagen1").files[0];
 let file2 = document.getElementById("imagen2").files[0];

 if(!nombre || !precio || !descripcion || !file1){
  alert("Completa todo");
  return;
 }

 let url1 = await subirImagen(file1);
 let url2 = file2 ? await subirImagen(file2) : "";

 await db.collection("productos").add({
  nombre,
  precio:Number(precio),
  descripcion,
  imagen:url1,
  imagen2:url2
 });

 alert("Producto agregado");
 cargar();
}

function cargar(){
 db.collection("productos").get().then(res=>{
  productos=[];
  res.forEach(doc=>{
    productos.push({...doc.data(), id:doc.id});
  });
  mostrar(productos);
 });
}

function mostrar(lista){
 let html="";
 lista.forEach(p=>{
  html+=`
  <div class="card">
    <b>${p.nombre}</b> - $${p.precio}<br>
    <small>${p.descripcion}</small><br>
    <img src="${p.imagen}">
    ${p.imagen2 ? `<img src="${p.imagen2}">` : ""}
    <br>
    <button onclick="eliminar('${p.id}')">Eliminar</button>
    <button onclick="editar('${p.id}')">Editar precio</button>
  </div>
  `;
 });
 document.getElementById("lista").innerHTML=html;
}

function eliminar(id){
 db.collection("productos").doc(id).delete();
 cargar();
}

function editar(id){
 let nuevo = prompt("Nuevo precio:");
 if(!nuevo) return;

 db.collection("productos").doc(id).update({
  precio:Number(nuevo)
 });
 cargar();
}

document.getElementById("buscar").addEventListener("keyup",function(){
 let f = this.value.toLowerCase();
 let filtrados = productos.filter(p=>p.nombre.toLowerCase().includes(f));
 mostrar(filtrados);
});

cargar();
</script>

</body>
</html>
