<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin ALP Moda</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#000,#f8c8dc);
color:#fff;
}

#login{
text-align:center;
margin-top:100px;
}

input, textarea{
padding:12px;
margin:8px;
border-radius:10px;
border:none;
width:250px;
}

button{
padding:12px 20px;
border:none;
border-radius:20px;
background:#ff4fa3;
color:white;
cursor:pointer;
}

#panel{
display:none;
padding:20px;
text-align:center;
}

.card{
background:#fff;
color:#000;
padding:10px;
margin:10px auto;
border-radius:10px;
max-width:400px;
}

img{
width:70px;
margin:5px;
border-radius:8px;
}
</style>
</head>

<body>

<div id="login">
<h2>🔐 Acceso Admin</h2>
<input id="usuario" placeholder="Usuario"><br>
<input id="password" type="password" placeholder="Contraseña"><br>
<button onclick="login()">Entrar</button>
</div>

<div id="panel">
<h2>📦 Panel</h2>

<input id="nombre" placeholder="Nombre"><br>
<input id="precio" placeholder="Precio"><br>
<textarea id="descripcion" placeholder="Descripción"></textarea><br>

<input type="file" id="imagen1"><br>
<input type="file" id="imagen2"><br>

<button onclick="agregar()">Agregar producto</button>

<hr>

<input id="buscar" placeholder="Buscar...">

<div id="lista"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>

<script>
firebase.initializeApp({
 apiKey:"AIzaSyBZvW4o8SbyStxX6Sfm4uRmMfN4UAi2pYI",
 authDomain:"alp-moda.firebaseapp.com",
 projectId:"alp-moda",
 storageBucket:"alp-moda.appspot.com"
});

const db=firebase.firestore();
const storage=firebase.storage();

let productos=[];

function login(){
 let u=document.getElementById("usuario").value.toUpperCase();
 let p=document.getElementById("password").value.toUpperCase();

 if(u==="ALP-ADMIN" && p==="OSIMIA"){
  login.style.display="none";
  panel.style.display="block";
  cargar();
 }else alert("Error");
}

async function subir(file){
 const ref=storage.ref("productos/"+Date.now()+file.name);
 await ref.put(file);
 return await ref.getDownloadURL();
}

async function agregar(){
 let nombre=document.getElementById("nombre").value;
 let precio=document.getElementById("precio").value;
 let descripcion=document.getElementById("descripcion").value;
 let f1=document.getElementById("imagen1").files[0];
 let f2=document.getElementById("imagen2").files[0];

 if(!nombre||!precio||!descripcion||!f1){
  alert("Completa todo");
  return;
 }

 let url1=await subir(f1);
 let url2=f2?await subir(f2):"";

 await db.collection("productos").add({
  nombre,
  precio:Number(precio),
  descripcion,
  imagen:url1,
  imagen2:url2
 });

 alert("Agregado");
 cargar();
}

function cargar(){
 db.collection("productos").get().then(res=>{
  productos=[];
  res.forEach(doc=>productos.push({...doc.data(),id:doc.id}));
  mostrar(productos);
 });
}

function mostrar(lista){
 let html="";
 lista.forEach(p=>{
  html+=`
  <div class="card">
    <b>${p.nombre}</b> - $${p.precio}<br>
    ${p.descripcion}<br>
    <img src="${p.imagen}">
    ${p.imagen2?`<img src="${p.imagen2}">`:""}
    <br>
    <button onclick="eliminar('${p.id}')">Eliminar</button>
  </div>`;
 });
 document.getElementById("lista").innerHTML=html;
}

function eliminar(id){
 db.collection("productos").doc(id).delete();
 cargar();
}

document.getElementById("buscar").addEventListener("keyup",function(){
 let f=this.value.toLowerCase();
 let filtrados=productos.filter(p=>p.nombre.toLowerCase().includes(f));
 mostrar(filtrados);
});
</script>

</body>
</html>
