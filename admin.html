<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin ALP Moda</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#000,#f8c8dc);
  color:#fff;
  text-align:center;
  padding:20px;
}

input {
  width:90%;
  max-width:400px;
  padding:12px;
  margin:10px;
  border:none;
  border-radius:8px;
}

button {
  background:#ff4fa3;
  color:#fff;
  padding:12px 20px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  font-weight:bold;
}

#panel {
  display:none;
}
</style>
</head>

<body>

<div id="login">
<h2>🔐 Acceso Admin</h2>
<input id="usuario" placeholder="Usuario"><br>
<input id="password" type="password" placeholder="Contraseña"><br>
<button onclick="login()">Entrar</button>
</div>

<div id="panel">
<h2>📦 Panel de productos</h2>

<input id="nombre" placeholder="Nombre del producto">
<input id="precio" placeholder="Precio">
<input id="imagen" placeholder="URL imagen">

<button onclick="agregar()">Agregar producto</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
 apiKey:"AIzaSyBZvW4o8SbyStxX6Sfm4uRmMfN4UAi2pYI",
 authDomain:"alp-moda.firebaseapp.com",
 projectId:"alp-moda"
});

const db = firebase.firestore();

function login(){
 let u = document.getElementById("usuario").value.trim().toUpperCase();
 let p = document.getElementById("password").value.trim().toUpperCase();

 if(u==="ALP-ADMIN" && p==="OSIMIA"){
  document.getElementById("login").style.display="none";
  document.getElementById("panel").style.display="block";
 } else {
  alert("Datos incorrectos");
 }
}

function agregar(){
 let nombre = document.getElementById("nombre").value;
 let precio = document.getElementById("precio").value;
 let imagen = document.getElementById("imagen").value;

 if(!nombre || !precio || !imagen){
  alert("Completa todos los campos");
  return;
 }

 db.collection("productos").add({
  nombre,
  precio:Number(precio),
  imagen
 });

 alert("Producto agregado");
}
</script>

</body>
</html>
