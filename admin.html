<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin ALP</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2 style="text-align:center;">Panel Admin</h2>

<input type="text" id="nombre" placeholder="Nombre del producto">
<input type="number" id="precio" placeholder="Precio">

<textarea id="descripcion" placeholder="Descripción (opcional)"></textarea>

<p style="text-align:center;">Imagen 1:</p>
<input type="file" id="imagen1" accept="image/*">

<p style="text-align:center;">Imagen 2 (opcional):</p>
<input type="file" id="imagen2" accept="image/*">

<select id="etiqueta">
  <option value="">Sin etiqueta</option>
  <option value="🔥 Nuevo">🔥 Nuevo</option>
  <option value="⭐ Popular">⭐ Popular</option>
</select>

<button onclick="agregarProducto()">Agregar producto</button>

<h3 style="text-align:center;">Productos actuales</h3>
<div id="listaAdmin"></div>

<script src="script.js"></script>
</body>
</html>
