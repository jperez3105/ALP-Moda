<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin ALP Moda</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#000,#f8c8dc);
color:white;
}

#login{
text-align:center;
margin-top:100px;
}

input, textarea{
padding:10px;
margin:5px;
border-radius:10px;
border:none;
width:250px;
}

button{
padding:10px 15px;
border:none;
border-radius:20px;
background:#ff4fa3;
color:white;
cursor:pointer;
}

#panel{display:none;padding:20px;text-align:center;}

.card{
background:white;
color:black;
margin:10px auto;
padding:10px;
border-radius:10px;
max-width:400px;
}
</style>
</head>

<body>

<div id="login">
<h2>🔐 Admin</h2>
<input id="user" placeholder="Usuario"><br>
<input id="pass" type="password" placeholder="Contraseña"><br>
<button onclick="login()">Entrar</button>
</div>

<div id="panel">
<h2>Panel de productos</h2>

<input id="nombre" placeholder="Nombre"><br>
<input id="precio" placeholder="Precio"><br>
<textarea id="descripcion" placeholder="Descripción"></textarea><br>

<input type="file" id="img1"><br>
<input type="file" id="img2"><br>

<label><input type="checkbox" id="nuevo">🔥 Nuevo</label>
<label><input type="checkbox" id="oferta">Oferta</label>
<label><input type="checkbox" id="tendencia">Tendencia</label>

<br><br>

<button onclick="agregar()">Agregar</button>

<hr>

<input id="buscar" placeholder="Buscar...">

<div id="lista"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>

<script>
firebase.initializeApp({
 apiKey:"AIzaSyBZvW4o8SbyStxX6Sfm4uRmMfN4UAi2pYI",
 authDomain:"alp-moda.firebaseapp.com",
 projectId:"alp-moda",
 storageBucket:"alp-moda.appspot.com"
});

const db=firebase.firestore();
const storage=firebase.storage();

let productos=[];

function login(){
 if(
  document.getElementById("user").value==="ALP-ADMIN" &&
  document.getElementById("pass").value==="OSIMIA"
 ){
  document.getElementById("login").style.display="none";
  document.getElementById("panel").style.display="block";
  cargar();
 }else alert("Datos incorrectos");
}

async function subir(file){
 const ref=storage.ref("productos/"+Date.now()+file.name);
 await ref.put(file);
 return await ref.getDownloadURL();
}

async function agregar(){
 let nombre=document.getElementById("nombre").value;
 let precio=document.getElementById("precio").value;
 let descripcion=document.getElementById("descripcion").value;

 let nuevo=document.getElementById("nuevo").checked;
 let oferta=document.getElementById("oferta").checked;
 let tendencia=document.getElementById("tendencia").checked;

 let f1=document.getElementById("img1").files[0];
 let f2=document.getElementById("img2").files[0];

 if(!nombre || !precio || !f1){
  alert("Falta info");
  return;
 }

 let url1=await subir(f1);
 let url2=f2?await subir(f2):"";

 await db.collection("productos").add({
  nombre,
  precio:Number(precio),
  descripcion,
  imagen:url1,
  imagen2:url2,
  nuevo,
  oferta,
  tendencia
 });

 alert("Guardado");
 cargar();
}

function cargar(){
 db.collection("productos").get().then(res=>{
  productos=[];
  res.forEach(doc=>productos.push({...doc.data(),id:doc.id}));
  mostrar(productos);
 });
}

function mostrar(lista){
 let html="";
 lista.forEach(p=>{
  html+=`
  <div class="card">
    <b>${p.nombre}</b> - $${p.precio}<br>
    <button onclick="eliminar('${p.id}')">Eliminar</button>
  </div>`;
 });
 document.getElementById("lista").innerHTML=html;
}

function eliminar(id){
 db.collection("productos").doc(id).delete();
 cargar();
}

document.getElementById("buscar").addEventListener("keyup",function(){
 let f=this.value.toLowerCase();
 let filtrados=productos.filter(p=>p.nombre.toLowerCase().includes(f));
 mostrar(filtrados);
});
</script>

</body>
</html>
