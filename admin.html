<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin ALP Moda</title>
</head>

<body>

<div id="login">
<h2>Acceso</h2>
<input id="usuario" placeholder="Usuario"><br><br>
<input id="password" type="password" placeholder="Contraseña"><br><br>
<button onclick="login()">Entrar</button>
</div>

<div id="panel" style="display:none;">
<h2>Panel de productos</h2>

<input id="nombre" placeholder="Nombre"><br><br>
<input id="precio" placeholder="Precio"><br><br>
<input id="imagen" placeholder="URL imagen"><br><br>

<button onclick="agregar()">Agregar producto</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
 apiKey:"AIzaSyBZvW4o8SbyStxX6Sfm4uRmMfN4UAi2pYI",
 authDomain:"alp-moda.firebaseapp.com",
 projectId:"alp-moda"
});

const db = firebase.firestore();

function login(){
 let u = document.getElementById("usuario").value.trim().toUpperCase();
 let p = document.getElementById("password").value.trim().toUpperCase();

 if(u==="ALP-ADMIN" && p==="OSIMIA"){
  document.getElementById("login").style.display="none";
  document.getElementById("panel").style.display="block";
 } else {
  alert("Datos incorrectos");
 }
}

function agregar(){
 let nombre = document.getElementById("nombre").value;
 let precio = document.getElementById("precio").value;
 let imagen = document.getElementById("imagen").value;

 if(!nombre || !precio || !imagen){
  alert("Completa todos los campos");
  return;
 }

 db.collection("productos").add({
  nombre: nombre,
  precio: Number(precio),
  imagen: imagen
 });

 alert("Producto agregado correctamente");
}
</script>

</body>
</html>
